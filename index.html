<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-top">
            <input type="text" id="searchInput" placeholder="単語検索 (スペース区切り)">
            <select id="searchLogic">
                <option value="AND">検索: AND</option>
                <option value="OR">検索: OR</option>
            </select>
        </div>
        <div class="filter-area">
            <div class="filter-group">
                <span class="label">期:</span>
                <label><input type="checkbox" class="filter-gen" value="103"> 103</label>
                <label><input type="checkbox" class="filter-gen" value="104"> 104</label>
                <label><input type="checkbox" class="filter-gen" value="105"> 105</label>
            </div>
            <div class="filter-group">
                <span class="label">出演者:</span>
                <div id="performerFilters" style="display: inline-block;"></div>
            </div>
            <select id="filterLogic">
                <option value="AND">フィルター: AND</option>
                <option value="OR">フィルター: OR</option>
            </select>
        </div>
    </header>

    <main id="archiveGrid" class="grid-container"></main>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <img id="modalImage" src="" alt="">
            <div class="modal-text">
                <h2 id="modalTitle"></h2>
                <p id="modalDate" class="date-label"></p>
                <div id="modalPerformers" class="perf-list"></div>
                <hr>
                <p id="modalSummary"></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
