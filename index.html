<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Connect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="単語検索 (スペース区切り)">
            <select id="searchLogic">
                <option value="AND">AND検索</option>
                <option value="OR">OR検索</option>
            </select>
        </div>

        <div class="filter-section">
            <div class="filter-group">
                <span>期:</span>
                <label><input type="checkbox" class="filter-gen" value="103"> 103</label>
                <label><input type="checkbox" class="filter-gen" value="104"> 104</label>
                <label><input type="checkbox" class="filter-gen" value="105"> 105</label>
            </div>
            <div class="filter-group performers">
                <span>出演者:</span>
                <div id="performerFilters"></div>
            </div>
            <div class="filter-logic-select">
                <select id="filterLogic">
                    <option value="AND">フィルターAND</option>
                    <option value="OR">フィルターOR</option>
                </select>
            </div>
        </div>
    </header>

    <main id="archiveGrid" class="grid-container"></main>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <img id="modalImage" src="" alt="">
            <div class="modal-body">
                <h2 id="modalTitle"></h2>
                <p id="modalDate" class="badge"></p>
                <div id="modalPerformers" class="perf-tags"></div>
                <hr>
                <p id="modalSummary"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
